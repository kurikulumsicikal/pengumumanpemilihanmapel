<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENGUMUMAN MAPEL | SMAN 1 CIKALONGWETAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-gold: #aa841e;
            --black: #1a1a1a;
            --white: #ffffff;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: var(--white);
        }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            width: 100%; max-width: 450px; border-radius: 30px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, var(--black) 0%, #333 100%); 
            padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--gold);
        }
        .logo-sekolah { 
            width: 80px; height: 80px; object-fit: contain; background: white; 
            padding: 10px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--gold);
        }
        .header h1 { font-size: 20px; margin: 0; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        
        /* TIMER STYLE */
        #timer-container { padding: 20px; text-align: center; background: rgba(212, 175, 55, 0.1); margin: 15px; border-radius: 15px; border: 1px dashed var(--gold); }
        .timer-text { font-size: 11px; color: var(--gold); font-weight: 800; margin-bottom: 10px; display: block; }
        #countdown { font-size: 24px; font-weight: 800; color: var(--white); letter-spacing: 2px; }

        .content { padding: 30px; }
        input { 
            width: 100%; padding: 18px; border: 1px solid var(--gold); border-radius: 15px; 
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; text-align: center; margin-bottom: 20px;
        }
        .btn-cek { 
            width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%); 
            color: var(--black); padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer;
        }
        
        /* HASIL STYLE */
        #hasil-wrapper { display: none; }
        .info-siswa { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--gold); }
        .label { font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase; }
        .value { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: block; }
        .mapel-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(212,175,55,0.2); display: flex; align-items: center; }
        .mapel-item span { color: var(--gold); font-weight: 800; margin-right: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="logo.png" class="logo-sekolah" alt="Logo" onerror="this.style.display='none'">
        <h1>HASIL PILIHAN MAPEL</h1>
        <p style="font-size: 11px; color: #aaa; margin-top: 5px;">SMAN 1 CIKALONGWETAN</p>
    </div>

    <div id="timer-container">
        <span class="timer-text">PENGUMUMAN DIBUKA DALAM:</span>
        <div id="countdown">Loading...</div>
    </div>

    <div class="content">
        <div id="form-pencarian" style="display:none;">
            <input type="text" id="nisn-siswa" placeholder="MASUKKAN NISN ANDA">
            <button class="btn-cek" onclick="cekMapel()">CEK DATA SEKARANG</button>
        </div>

        <div id="hasil-wrapper">
            <div class="info-siswa">
                <span class="label">Nama Lengkap</span><span id="out-nama" class="value">-</span>
                <span class="label">Kelas</span><span id="out-kelas" class="value">-</span>
            </div>
            <div id="out-mapel-list"></div>
            <button class="btn-cek" style="background: #333; color: white; margin-top: 20px;" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. ATUR WAKTU MUNDUR DI SINI
    // Format: "Bulan Tanggal, Tahun Jam:Menit:Detik"
    // ==========================================
    const waktuTujuan = new Date("June 30, 2026 08:00:00").getTime();

    const x = setInterval(function() {
        const sekarang = new Date().getTime();
        const selisih = waktuTujuan - sekarang;

        const hari = Math.floor(selisih / (1000 * 60 * 60 * 24));
        const jam = Math.floor((selisih % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const menit = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
        const detik = Math.floor((selisih % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = hari + "j " + jam + "j " + menit + "m " + detik + "s ";

        if (selisih < 0) {
            clearInterval(x);
            document.getElementById("timer-container").style.display = "none";
            document.getElementById("form-pencarian").style.display = "block";
        }
    }, 1000);

    async function cekMapel() {
        const nisn = document.getElementById('nisn-siswa').value;
        const url = "https://script.google.com/macros/s/AKfycbyueUEVB9637tN4iH2GULYaca0mUaCryFLRmg5QcQi87xw8D8dOTsoqS9tr51dmkDgO/exec"; 

        if (!nisn) { alert("Isi NISN!"); return; }
        try {
            const response = await fetch(url + "?nisn=" + nisn);
            const data = await response.json();
            if (data.status === "DITEMUKAN") {
                document.getElementById('form-pencarian').style.display = "none";
                document.getElementById('out-nama').innerText = data.nama;
                document.getElementById('out-kelas').innerText = data.kelas;
                const listContainer = document.getElementById('out-mapel-list');
                listContainer.innerHTML = ""; 
                [data.p1, data.p2, data.p3, data.p4].forEach((item, index) => {
                    if(item) {
                        const div = document.createElement('div');
                        div.className = 'mapel-item';
                        div.innerHTML = `<span>${index + 1}</span> ${item}`;
                        listContainer.appendChild(div);
                    }
                });
                document.getElementById('hasil-wrapper').style.display = "block";
            } else { alert("Data tidak ditemukan."); }
        } catch (e) { alert("Gangguan sistem."); }
    }
</script>
</body>
</html>

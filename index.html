<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEK MAPEL | SMAN 1 CIKALONGWETAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); padding: 25px; color: white; text-align: center; border-bottom: 4px solid var(--accent); }
        .header h1 { font-size: 18px; margin: 0; }
        .content { padding: 25px; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        .btn-cek { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
        #hasil-wrapper { display: none; }
        .info-siswa { background: #f8fafc; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .label { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; display: block; }
        .value { font-size: 16px; color: var(--primary); font-weight: 700; display: block; margin-bottom: 8px; }
        .mapel-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e2e8f0; display: flex; align-items: center; font-size: 14px; font-weight: 700; color: #1e3a8a; }
        .mapel-item span { background: var(--accent); color: var(--primary); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>HASIL PEMILIHAN MAPEL</h1>
        <p style="font-size: 10px; opacity: 0.7; margin-top: 5px;">SMAN 1 CIKALONGWETAN</p>
    </div>
    <div class="content">
        <div id="form-pencarian">
            <input type="text" id="nisn-siswa" placeholder="Masukkan NISN">
            <button class="btn-cek" onclick="cekMapel()">CEK HASIL</button>
        </div>
        <div id="hasil-wrapper">
            <div class="info-siswa">
                <span class="label">Nama Siswa</span>
                <span id="out-nama" class="value">-</span>
                <span class="label">Kelas</span>
                <span id="out-kelas" class="value">-</span>
            </div>
            <div id="out-mapel-list"></div>
            <button class="btn-cek" style="background:#64748b; margin-top:15px;" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>
</div>

<script>
    async function cekMapel() {
        const nisn = document.getElementById('nisn-siswa').value;
        const url = "https://script.google.com/macros/s/AKfycbyueUEVB9637tN4iH2GULYaca0mUaCryFLRmg5QcQi87xw8D8dOTsoqS9tr51dmkDgO/exec"; 

        if (!nisn) { alert("Isi NISN dulu!"); return; }
        try {
            const response = await fetch(url + "?nisn=" + nisn);
            const data = await response.json();
            if (data.status === "DITEMUKAN") {
                document.getElementById('form-pencarian').style.display = "none";
                document.getElementById('out-nama').innerText = data.nama;
                document.getElementById('out-kelas').innerText = data.kelas;
                const listContainer = document.getElementById('out-mapel-list');
                listContainer.innerHTML = ""; 
                const daftarMapel = [data.p1, data.p2, data.p3, data.p4];
                daftarMapel.forEach((item, index) => {
                    if(item) {
                        const div = document.createElement('div');
                        div.className = 'mapel-item';
                        div.innerHTML = `<span>${index + 1}</span> ${item}`;
                        listContainer.appendChild(div);
                    }
                });
                document.getElementById('hasil-wrapper').style.display = "block";
            } else { alert("Maaf, NISN tidak ditemukan."); }
        } catch (e) { alert("Sistem sedang sibuk."); }
    }
</script>
</body>
</html>
